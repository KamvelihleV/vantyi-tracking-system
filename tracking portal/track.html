<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Track Your Order — Vantyi / Dee Marble</title>
<style>
  :root{
    --navy:#1E2761;
    --navy-deep:#151b49;
    --ice:#CADCFC;
    --ice-tint:#EEF3FF;
    --card:#F4F7FE;
    --ink:#1E2761;
    --muted:#5B6785;
    --line:#DDE4F7;
    --white:#ffffff;
    --green:#1E7A46;
    --green-bg:#E1F5E9;
    --danger:#B3261E;
    --danger-bg:#FBEAEA;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:linear-gradient(180deg, var(--navy) 0%, var(--navy) 220px, #FAFBFF 220px);
    color:var(--ink);
    font-family:'Segoe UI', system-ui, -apple-system, Roboto, Arial, sans-serif;
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  h1,h2,h3{ font-family:Cambria, Georgia, 'Times New Roman', serif; margin:0; }

  .wrap{ max-width:560px; margin:0 auto; padding:0 20px 60px; }
  .header{ padding:36px 0 28px; text-align:center; }
  .header .mark{
    width:52px; height:52px; border-radius:14px; background:var(--ice); color:var(--navy);
    display:flex; align-items:center; justify-content:center; font-weight:800; font-size:24px;
    font-family:Cambria, serif; margin:0 auto 14px;
  }
  .header h1{ color:var(--white); font-size:24px; }
  .header p{ color:var(--ice); font-size:14px; margin-top:6px; }

  .search-card{
    background:var(--white); border-radius:16px; padding:26px; box-shadow:0 12px 30px rgba(21,27,73,.18);
    margin-top:-16px;
  }
  label{ font-size:12.5px; font-weight:700; color:var(--navy); display:block; margin-bottom:7px; letter-spacing:.3px; }
  .code-input{
    width:100%; padding:14px 16px; border-radius:10px; border:2px solid var(--line);
    font-size:19px; font-family:'Courier New', monospace; letter-spacing:3px; text-transform:uppercase;
    text-align:center; color:var(--navy); font-weight:700;
  }
  .code-input:focus{ outline:none; border-color:var(--navy); }
  .code-input::placeholder{ letter-spacing:2px; font-weight:400; color:#AEB9E0; }
  .hint{ font-size:12px; color:var(--muted); margin-top:8px; text-align:center; }

  button.track-btn{
    width:100%; margin-top:16px; background:var(--navy); color:var(--white); border:none;
    padding:14px; border-radius:10px; font-size:15px; font-weight:700; cursor:pointer; font-family:inherit;
  }
  button.track-btn:hover{ background:var(--navy-deep); }
  button.track-btn:disabled{ opacity:.55; cursor:not-allowed; }

  .msg{ margin-top:18px; padding:14px 16px; border-radius:10px; font-size:13.5px; text-align:center; }
  .msg.error{ background:var(--danger-bg); color:var(--danger); }

  /* ---- Result ---- */
  .result{ margin-top:22px; }
  .result-card{ background:var(--white); border-radius:16px; padding:26px; box-shadow:0 12px 30px rgba(21,27,73,.10); }
  .result-top{ display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:6px; }
  .result-top h2{ font-size:19px; color:var(--navy); }
  .status-pill{ display:inline-block; padding:6px 14px; border-radius:20px; font-size:12.5px; font-weight:700; background:var(--green-bg); color:var(--green); }
  .for-name{ font-size:13px; color:var(--muted); margin-bottom:20px; }

  .pipeline{ display:flex; margin:18px 0 22px; }
  .pipeline .seg{ flex:1; text-align:center; padding:0 3px; }
  .pipeline .seg .bar{ height:9px; border-radius:6px; background:var(--line); }
  .pipeline .seg.done .bar{ background:var(--navy); }
  .pipeline .seg .lbl{ font-size:10px; color:var(--muted); margin-top:7px; display:block; line-height:1.25; }
  .pipeline .seg.done .lbl{ color:var(--navy); font-weight:700; }

  .detail-grid{ display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-top:20px; }
  .detail{ background:var(--card); border-radius:10px; padding:13px 14px; }
  .detail .k{ font-size:10.5px; text-transform:uppercase; letter-spacing:.6px; color:var(--muted); font-weight:700; }
  .detail .v{ font-size:14.5px; color:var(--ink); margin-top:3px; font-weight:600; }

  .timeline{ margin-top:24px; }
  .timeline h3{ font-size:13.5px; color:var(--navy); margin-bottom:12px; }
  .t-item{ display:flex; gap:12px; padding:8px 0; }
  .t-dot{ width:9px; height:9px; border-radius:50%; background:var(--navy); margin-top:5px; flex-shrink:0; }
  .t-text{ font-size:13px; color:var(--ink); }
  .t-date{ font-size:11.5px; color:var(--muted); }

  .footer-note{ text-align:center; margin-top:26px; font-size:12px; color:var(--muted); line-height:1.5; }
  .footer-note a{ color:var(--navy); }

  .spinner{ display:inline-block; width:16px; height:16px; border:2px solid rgba(255,255,255,.4);
    border-top-color:#fff; border-radius:50%; animation:spin .7s linear infinite; vertical-align:-3px; margin-right:8px; }
  @keyframes spin{ to{ transform:rotate(360deg); } }
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div class="mark">V</div>
    <h1>Track Your Order</h1>
    <p>Vantyi Funeral Parlour &amp; Dee Marble and Granite</p>
  </div>

  <div class="search-card">
    <label for="code">Enter your tracking code</label>
    <input id="code" class="code-input" placeholder="e.g. JBDZ076M" maxlength="8" autocomplete="off" />
    <div class="hint">This was given to you when your order was placed — no account or password needed.</div>
    <button class="track-btn" id="trackBtn">Track my order</button>
    <div id="msg"></div>
  </div>

  <div id="result"></div>

  <div class="footer-note">
    Can't find your code, or have a question about your order?<br/>
    Please contact Vantyi Funeral Parlour or Dee Marble and Granite directly.
  </div>
</div>

<script>
const API_BASE = "https://vantyi-tracking-app-frcucjahcxcxbxfq.southafricanorth-01.azurewebsites.net";
const STAGES = ["Quoted", "Approved", "In Production", "Ready", "Installed"];

const codeInput = document.getElementById("code");
const trackBtn = document.getElementById("trackBtn");
const msgEl = document.getElementById("msg");
const resultEl = document.getElementById("result");

function fmtDate(d) {
  if (!d) return "—";
  const dt = new Date(d);
  return dt.toLocaleDateString(undefined, { day: "numeric", month: "short", year: "numeric" });
}

function renderPipeline(status) {
  const idx = STAGES.indexOf(status);
  return `<div class="pipeline">${STAGES.map((s, i) => `
    <div class="seg${i <= idx ? " done" : ""}">
      <div class="bar"></div>
      <span class="lbl">${s}</span>
    </div>`).join("")}</div>`;
}

function renderTimeline(timeline) {
  if (!timeline || timeline.length === 0) return "";
  return `
    <div class="timeline">
      <h3>Order history</h3>
      ${timeline.map(t => `
        <div class="t-item">
          <div class="t-dot"></div>
          <div>
            <div class="t-text">${t.status}</div>
            <div class="t-date">${t.changed_at ? fmtDate(t.changed_at) : ""}</div>
          </div>
        </div>
      `).join("")}
    </div>`;
}

function renderResult(data) {
  resultEl.innerHTML = `
    <div class="result">
      <div class="result-card">
        <div class="result-top">
          <h2>Order for ${data.client_display_name}</h2>
          <span class="status-pill">${data.status}</span>
        </div>
        <div class="for-name">Tracking code: ${data.tracking_code}</div>

        ${renderPipeline(data.status)}

        <div class="detail-grid">
          <div class="detail"><div class="k">Material</div><div class="v">${data.material || "—"}</div></div>
          <div class="detail"><div class="k">Order placed</div><div class="v">${fmtDate(data.order_date)}</div></div>
          <div class="detail"><div class="k">Expected completion</div><div class="v">${fmtDate(data.expected_completion)}</div></div>
          <div class="detail"><div class="k">Installation site</div><div class="v">${data.installation_site || "—"}</div></div>
        </div>

        ${renderTimeline(data.timeline)}
      </div>
    </div>
  `;
}

async function trackOrder() {
  const code = codeInput.value.trim().toUpperCase();
  msgEl.innerHTML = "";
  resultEl.innerHTML = "";

  if (!code) {
    msgEl.innerHTML = `<div class="msg error">Please enter your tracking code.</div>`;
    return;
  }

  trackBtn.disabled = true;
  trackBtn.innerHTML = `<span class="spinner"></span>Looking up your order…`;

  try {
    const res = await fetch(API_BASE + "/track/" + encodeURIComponent(code));
    if (res.status === 404) {
      msgEl.innerHTML = `<div class="msg error">We couldn't find an order with that code. Please check it and try again.</div>`;
      return;
    }
    if (!res.ok) {
      msgEl.innerHTML = `<div class="msg error">Something went wrong. Please try again in a moment.</div>`;
      return;
    }
    const data = await res.json();
    renderResult(data);
  } catch (e) {
    msgEl.innerHTML = `<div class="msg error">Couldn't connect right now. Please check your internet connection and try again.</div>`;
  } finally {
    trackBtn.disabled = false;
    trackBtn.textContent = "Track my order";
  }
}

trackBtn.addEventListener("click", trackOrder);
codeInput.addEventListener("keydown", (e) => { if (e.key === "Enter") trackOrder(); });
codeInput.addEventListener("input", () => { codeInput.value = codeInput.value.toUpperCase(); });
</script>
</body>
</html>
